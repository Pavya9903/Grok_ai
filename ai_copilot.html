
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Interview Copilot</title>

<style>
body{
    margin:0;
    padding:15px;
    background:#0f172a;
    font-family:Segoe UI;
    color:white;
}
h3{
    margin-top:0;
}
button{
    padding:10px 18px;
    border:none;
    border-radius:8px;
    font-size:14px;
    margin-right:10px;
    cursor:pointer;
}
#startBtn{ background:#22c55e; color:white; }
#stopBtn{ background:#dc2626; color:white; }
#status{
    margin-top:12px;
    font-weight:bold;
    color:#94a3b8;
}
#output{
    margin-top:20px;
    background:#020617;
    padding:15px;
    border-radius:10px;
    min-height:220px;
    white-space:pre-wrap;
    line-height:1.6;
}
</style>
</head>

<body>

<h3>AI Interview Copilot</h3>

<button id="startBtn">Start Listening</button>
<button id="stopBtn">Stop</button>

<div id="status">Status: Idle</div>
<div id="output"></div>

<script>
let API_KEY = prompt("Enter your Groq API Key:");

let recognition;

if ('webkitSpeechRecognition' in window) {
    recognition = new webkitSpeechRecognition();
    recognition.continuous = true;
    recognition.interimResults = false;
    recognition.lang = "en-US";
} else {
    alert("Speech Recognition not supported in this browser. Use Chrome.");
}

document.getElementById("startBtn").onclick = () => {
    if (!recognition) return;
    recognition.start();
    document.getElementById("status").innerText = "Status: Listening...";
};

document.getElementById("stopBtn").onclick = () => {
    if (!recognition) return;
    recognition.stop();
    document.getElementById("status").innerText = "Status: Stopped";
};

recognition.onresult = async function(event){
    const transcript = event.results[event.results.length-1][0].transcript;
    document.getElementById("status").innerText = "Heard: " + transcript;
    document.getElementById("output").innerText = "Thinking...";

    try {
        const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "Authorization": "Bearer " + API_KEY
            },
            body: JSON.stringify({
                model: "llama-3.3-70b-versatile",
                messages: [
                    {
                        role: "system",
                        content: "You are an AI Interview Copilot. Give concise, structured, accurate answers. Bold important technical concepts."
                    },
                    {
                        role: "user",
                        content: transcript
                    }
                ],
                temperature: 0.2,
                max_tokens: 400
            })
        });

        const data = await response.json();
        document.getElementById("output").innerText =
            data.choices[0].message.content;

    } catch (err) {
        document.getElementById("output").innerText =
            "Error: " + err.message;
    }
};
</script>

</body>
</html>
